services:
  hermes-social:
    build: .
    container_name: hermes-social
    restart: unless-stopped
    ports:
      - "${HERMES_SOCIAL_PORT:-8340}:8340"
      - "${HERMES_SOCIAL_MCP_PORT:-8341}:8341"
    env_file:
      - .env
    environment:
      - HERMES_SOCIAL_DATABASE_URL=sqlite:////app/data/hermes_social.db
      - HERMES_SOCIAL_DATA_DIR=/app/data
    volumes:
      - ./data:/app/data
    networks:
      - default
      - hermes-network

networks:
  default:
  hermes-network:
    external: true
    name: ${HERMES_NETWORK:-hermes-network}
