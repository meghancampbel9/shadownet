services:
  shadownet:
    build: .
    container_name: shadownet
    restart: unless-stopped
    ports:
      - "${SHADOWNET_PORT:-8340}:8340"
      - "${SHADOWNET_MCP_PORT:-8341}:8341"
    env_file:
      - .env
    environment:
      - SHADOWNET_DATABASE_URL=sqlite:////app/data/shadownet.db
      - SHADOWNET_DATA_DIR=/app/data
    volumes:
      - ./data:/app/data
    networks:
      - default
      - agent-network

networks:
  default:
  agent-network:
    external: true
    name: ${AGENT_NETWORK:-agent-network}
