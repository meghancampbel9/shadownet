# Test peer instance overlay.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.test.yml up -d
#
# Spins up a second hermes-social for local A2A testing.
# Requires .env.test (copy .env and change identity values).

services:
  hermes-social-test:
    build: .
    container_name: hermes-social-test
    restart: unless-stopped
    ports:
      - "${HERMES_SOCIAL_TEST_PORT:-8350}:8340"
      - "${HERMES_SOCIAL_TEST_MCP_PORT:-8351}:8341"
    env_file:
      - .env.test
    environment:
      - HERMES_SOCIAL_DATABASE_URL=sqlite:////app/data/hermes_social.db
      - HERMES_SOCIAL_DATA_DIR=/app/data
    volumes:
      - ./data-test:/app/data
    networks:
      - default
      - hermes-network
