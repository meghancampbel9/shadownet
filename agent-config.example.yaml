# Example Hermes Agent webhook configuration for shadownet
#
# Add this section to your Hermes agent's config.yaml under platforms.
# This configures two webhook routes that shadownet uses:
#
#   a2a-negotiate — silent agent-to-agent negotiation (deliver: log)
#   a2a-inbox     — user-facing notifications (deliver: auto)
#
# shadownet routes messages automatically:
#   coordination_request → a2a-negotiate (agent handles silently)
#   everything else      → a2a-inbox (delivered to user's chat platform)
#
# Generate a shared secret with:
#   python3 -c "import secrets; print(secrets.token_hex(32))"
#
# The same secret must be set in shadownet's .env as
# SHADOWNET_NOTIFICATION_WEBHOOK_SECRET.
# SHADOWNET_NOTIFICATION_NEGOTIATE_URL must point to the a2a-negotiate route.

platforms:
  webhook:
    enabled: true
    extra:
      port: 8644
      routes:
        a2a-negotiate:
          secret: "<shared secret>"
          deliver: log
          prompt: >-
            Load shadownet-coordination AND user-profile skills.
            A message from {contact} (contact_id: {contact_id}) (interaction_id: {interaction_id}) (type: {data_type}).
            Data: {data}. Follow the RECEIVER FLOW steps 1-3 autonomously.
            Output "Done." when finished. Do NOT notify the user.
        a2a-inbox:
          secret: "<shared secret>"
          deliver: auto
          prompt: >-
            Load shadownet-coordination skill.
            A message from {contact} (contact_id: {contact_id}) (interaction_id: {interaction_id}) (type: {data_type}).
            Data: {data}.
            RULES: You are in a one-shot webhook session. You CANNOT wait for the user to reply.
            Output ONE short message based on data_type and STOP. Do NOT call any tool.
            - If data_type is "response": present the plan concisely and say "Reply /shadownet-coordination confirm to confirm."
            - If data_type is "confirmation": tell user "[contact] confirmed the plan." and say "Reply /shadownet-coordination accept to accept."
            - If data_type is "confirmed": say "All set! [brief plan summary]."
            - If data_type is "message": relay the message from {contact}.
            Do NOT call social_confirm_plan, social_accept_plan, or any other tool. The user will reply and a new session will handle it.
