# Example Hermes Agent webhook configuration for shadownet
#
# Add this section to your Hermes agent's config.yaml under platforms.
# This configures two webhook routes that shadownet uses:
#
#   a2a-negotiate — silent agent-to-agent negotiation (deliver: log)
#   a2a-inbox     — user-facing notifications (deliver: auto)
#
# shadownet routes messages automatically:
#   coordination_request → a2a-negotiate (agent handles silently)
#   everything else      → a2a-inbox (delivered to user's chat platform)
#
# Generate a shared secret with:
#   python3 -c "import secrets; print(secrets.token_hex(32))"
#
# The same secret must be set in shadownet's .env as
# SHADOWNET_NOTIFICATION_WEBHOOK_SECRET.

platforms:
  webhook:
    enabled: true
    extra:
      port: 8644
      routes:
        a2a-negotiate:
          secret: "<shared secret>"
          deliver: log
          prompt: >-
            Load shadownet-coordination AND user-profile skills.
            A message from {contact} (interaction_id: {interaction_id}) (type: {data_type}).
            Data: {data}. Follow the RECEIVER FLOW.
        a2a-inbox:
          secret: "<shared secret>"
          deliver: auto
          prompt: >-
            Load shadownet-coordination skill.
            A message from {contact} (interaction_id: {interaction_id}) (type: {data_type}).
            Data: {data}.
            RULES: Present the plan to your user and ask them to confirm/accept.
            Output ONLY the question, then STOP. Do NOT call any tool until the user replies.
            When user confirms: if data_type is "response", call social_confirm_plan(contact_id). If data_type is "confirmation", call social_accept_plan(interaction_id="{interaction_id}"). If data_type is "confirmed", just say "All set!" and stop.
            Follow the skill procedure for this data_type.
